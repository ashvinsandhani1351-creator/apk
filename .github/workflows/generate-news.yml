name: Hourly AI News Generator

on:
  schedule:
    # Runs at minute 0 past every hour
    - cron: '0 * * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history to ensure proper committing
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run AI News Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-news.mjs
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "AI News Bot"
          git config --global user.email "bot@bitcryptpress.online"
          
          # Add only new markdown articles in data/news directory
          git add data/news/*.md
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new articles generated. Skipping commit."
          else
            git commit -m "Content: 🤖 Auto-generated AI news updates"
            git push origin main
          fi
